name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions: {}

jobs:
  authorize:
    name: Authorize trusted Claude trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.authorize.outputs.should_run }}
    steps:
      - name: Require a trusted actor for public comment triggers
        id: authorize
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          REVIEW_BODY: ${{ github.event.review.body || '' }}
          COMMENT_ASSOCIATION: ${{ github.event.comment.author_association || '' }}
          REVIEW_ASSOCIATION: ${{ github.event.review.author_association || '' }}
        run: |
          trusted_association_regex='^(OWNER|MEMBER|COLLABORATOR)$'
          should_run=false

          case "$EVENT_NAME" in
            issue_comment|pull_request_review_comment)
              if printf '%s' "$COMMENT_BODY" | grep -Fq '@claude' &&
                 printf '%s' "$COMMENT_ASSOCIATION" | grep -Eq "$trusted_association_regex"; then
                should_run=true
              fi
              ;;
            pull_request_review)
              if printf '%s' "$REVIEW_BODY" | grep -Fq '@claude' &&
                 printf '%s' "$REVIEW_ASSOCIATION" | grep -Eq "$trusted_association_regex"; then
                should_run=true
              fi
              ;;
          esac

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

  claude:
    needs: authorize
    if: needs.authorize.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'
